name: refresh-demo

# Refreshes the public dashboard's demo data weekly.
# This workflow does NOT run real user analytics — that's what `tokenpayback` does locally.
# The Vercel-deployed dashboard at tokenpayback.vercel.app shows synthetic example data only.

on:
  schedule:
    - cron: "0 1 * * 1"   # Monday 09:00 Asia/Shanghai
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Regenerate demo data
        run: python -m tokenpayback.demo_data > dashboard/data.json
      - name: Commit if changed
        run: |
          git config user.name "tokenpayback-bot"
          git config user.email "bot@tokenpayback"
          git add dashboard/data.json
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: refresh demo data $(date -u +%Y-W%V)"
          git push
      - name: Redeploy Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: dashboard
        run: |
          npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
