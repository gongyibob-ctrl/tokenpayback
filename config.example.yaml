# Copy to config.local.yaml and fill in.
# config.local.yaml is gitignored.

# Legacy fields (still used by the category-baseline fallback when role-based
# valuation isn't available)
hourly_rate_usd: 150
value_per_pr_usd: 600
value_per_line_committed_usd: 0.30

# v0.6+: human-labor-market benchmark. The LLM uses these as anchors when
# estimating hourly rates for the equivalent professional role on each session.
# Examples:
#   region=us-west, seniority=senior     → senior eng ≈ $200/hr
#   region=eu,      seniority=mid        → mid eng    ≈ €60/hr
#   region=china,   seniority=junior     → junior eng ≈ ¥80/hr
#   region=global-avg, seniority=senior  → freelancer-mix anchor
benchmark:
  region: us-west             # us-west | us-east | eu | china | sea | latam | global-avg
  seniority: senior           # junior | mid | senior | staff | consultant
  currency: USD

# GitHub username for output attribution
github_username: your-github-username

# Repos to count. Leave empty to count all public + private repos under github_username.
github_repos: []
  # - owner/repo
  # - owner/repo2

# Fixed monthly subscriptions (added flat to cost).
fixed_monthly_subscriptions_usd:
  cursor: 20
  github_copilot: 19
  claude_max: 100   # if you have Claude.ai subscription
  # add others

# LLM API providers — read usage from their APIs
providers:
  anthropic:
    enabled: true
    # API key for Anthropic Admin API to read org usage
    # If not set, will fall back to env var ANTHROPIC_ADMIN_KEY
  openai:
    enabled: false
    # Same — uses OPENAI_ADMIN_KEY env var

# Output
report_dir: reports
dashboard_data: dashboard/data.json
